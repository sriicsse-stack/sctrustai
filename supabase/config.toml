[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
# Production site URL — ensure this matches APP_URL in your environment
site_url = "https://medo.dev"
additional_redirect_urls = ["https://medo.dev/auth/callback", "https://medo.dev"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[edge_runtime]
enabled = true

# serve-app is a public HTML serving function — no JWT required.
# The anon key is passed as ?apikey= query param to satisfy Supabase routing.
[functions.serve-app]
verify_jwt = false
